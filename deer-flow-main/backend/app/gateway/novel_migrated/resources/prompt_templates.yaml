AUTO_CHARACTER_ANALYSIS: "<system>\n你是专业的小说角色设计顾问，擅长预测剧情发展对角色的需求。\n</system>\n\n<task>\n\
  【分析任务】\n预测在接下来的{chapter_count}章续写中，根据剧情发展方向和阶段，是否需要引入新角色。\n\n【重要说明】\n这是预测性分析，而非基于已生成内容的事后分析。\n\
  </task>\n\n<project priority=\"P1\">\n【项目信息】\n书名：{title}\n类型：{genre}\n主题：{theme}\n\
  \n【世界观】\n时间背景：{time_period}\n地理位置：{location}\n氛围基调：{atmosphere}\n</project>\n\n\
  <context priority=\"P0\">\n【已有角色】\n{existing_characters}\n\n【已有章节概览】\n{all_chapters_brief}\n\
  \n【续写计划】\n- 起始章节：第{start_chapter}章\n- 续写数量：{chapter_count}章\n- 剧情阶段：{plot_stage}\n\
  - 发展方向：{story_direction}\n</context>\n\n<output priority=\"P0\">\n【输出格式】\n返回纯JSON对象（两种情况之一）：\n\
  \n**情况A：需要新角色**\n{{\n  \"needs_new_characters\": true,\n  \"reason\": \"预测分析原因（150-200字），说明为什么即将的剧情需要新角色\"\
  ,\n  \"character_count\": 2,\n  \"character_specifications\": [\n    {{\n      \"\
  name\": \"建议的角色名字（可选）\",\n      \"role_description\": \"角色在剧情中的定位和作用（100-150字）\"\
  ,\n      \"suggested_role_type\": \"supporting/antagonist/protagonist\",\n     \
  \ \"importance\": \"high/medium/low\",\n      \"appearance_chapter\": {start_chapter},\n\
  \      \"key_abilities\": [\"能力1\", \"能力2\"],\n      \"plot_function\": \"在剧情中的具体功能\"\
  ,\n      \"relationship_suggestions\": [\n        {{\n          \"target_character\"\
  : \"现有角色名\",\n          \"relationship_type\": \"建议的关系类型\",\n          \"reason\"\
  : \"为什么建立这种关系\"\n        }}\n      ]\n    }}\n  ]\n}}\n\n**情况B：不需要新角色**\n{{\n  \"\
  needs_new_characters\": false,\n  \"reason\": \"现有角色足以支撑即将的剧情发展，说明理由\"\n}}\n</output>\n\
  \n<constraints>\n【必须遵守】\n✅ 这是预测性分析，面向未来剧情\n✅ 考虑剧情的自然发展和节奏\n✅ 确保引入必要性，不为引入而引入\n✅\
  \ 优先考虑角色的长期作用\n\n【禁止事项】\n❌ 输出markdown标记\n❌ 基于已生成内容做事后分析\n❌ 为了引入角色而强行引入\n❌ 设计一次性功能角色\n\
  </constraints>"
AUTO_CHARACTER_GENERATION: "<system>\n你是专业的角色设定师，擅长根据剧情需求创建完整的角色设定。\n</system>\n\n\
  <task>\n【生成任务】\n为小说生成新角色的完整设定，包括基本信息、性格背景、关系网络和职业信息。\n</task>\n\n<project priority=\"\
  P1\">\n【项目信息】\n书名：{title}\n类型：{genre}\n主题：{theme}\n\n【世界观】\n时间背景：{time_period}\n\
  地理位置：{location}\n氛围基调：{atmosphere}\n世界规则：{rules}\n</project>\n\n<context priority=\"\
  P0\">\n【已有角色】\n{existing_characters}\n\n【剧情上下文】\n{plot_context}\n\n【角色规格要求】\n{character_specification}\n\
  </context>\n\n<requirements priority=\"P0\">\n【核心要求】\n1. 角色必须符合剧情需求和世界观设定\n2. **必须分析新角色与已有角色的关系**，至少建立1-3个有意义的关系\n\
  3. 性格、背景要有深度和独特性\n4. 外貌描写要具体生动\n5. 特长和能力要符合角色定位\n6. **如果【已有角色】中包含职业列表，必须为角色设定职业**\n\
  </requirements>\n\n<output priority=\"P0\">\n【输出格式】\n返回纯JSON对象：\n\n{{\n  \"name\"\
  : \"角色姓名\",\n  \"age\": 25,\n  \"gender\": \"男/女/其他\",\n  \"role_type\": \"supporting\"\
  ,\n  \"personality\": \"性格特点的详细描述（100-200字）\",\n  \"background\": \"背景故事的详细描述（100-200字）\"\
  ,\n  \"appearance\": \"外貌描述（50-100字）\",\n  \"traits\": [\"特长1\", \"特长2\", \"特长3\"\
  ],\n  \"relationships_text\": \"用自然语言描述该角色与其他角色的关系网络\",\n  \"relationships\": [\n\
  \    {{\n      \"target_character_name\": \"已存在的角色名称\",\n      \"relationship_type\"\
  : \"关系类型\",\n      \"intimacy_level\": 75,\n      \"description\": \"关系的具体描述\",\n\
  \      \"status\": \"active\"\n    }}\n  ],\n  \"organization_memberships\": [\n\
  \    {{\n      \"organization_name\": \"已存在的组织名称\",\n      \"position\": \"职位\"\
  ,\n      \"rank\": 5,\n      \"loyalty\": 80\n    }}\n  ],\n  \"career_info\": {{\n\
  \    \"main_career_name\": \"从可用主职业列表中选择的职业名称\",\n    \"main_career_stage\": 5,\n\
  \    \"sub_careers\": [\n      {{\n        \"career_name\": \"从可用副职业列表中选择的职业名称\"\
  ,\n        \"stage\": 3\n      }}\n    ]\n  }}\n}}\n\n【数值范围】\n- intimacy_level：-100到100（负值表示敌对）\n\
  - loyalty：0到100\n- rank：0到10\n</output>\n\n<constraints>\n【必须遵守】\n✅ 符合剧情需求和世界观设定\n\
  ✅ relationships数组必填：至少1-3个关系\n✅ target_character_name必须精确匹配【已有角色】\n✅ organization_memberships只能引用已存在的组织\n\
  \n【禁止事项】\n❌ 输出markdown标记\n❌ 在描述中使用特殊符号\n❌ 引用不存在的角色或组织\n❌ 使用职业ID而非职业名称\n</constraints>"
