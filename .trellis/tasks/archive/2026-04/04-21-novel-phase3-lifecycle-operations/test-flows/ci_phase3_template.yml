name: phase3-novel-lifecycle-template

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'deer-flow-main/backend/**'
      - 'deer-flow-main/frontend/**'
      - '.trellis/tasks/04-21-novel-phase3-lifecycle-operations/**'

jobs:
  backend-phase3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run backend phase3 flow
        run: |
          bash .trellis/tasks/04-21-novel-phase3-lifecycle-operations/test-flows/run_backend_phase3.sh

  frontend-phase3:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Run frontend phase3 flow (Win-only)
        shell: pwsh
        run: |
          ./.trellis/tasks/04-21-novel-phase3-lifecycle-operations/test-flows/run_frontend_phase3.ps1

  contract-e2e-phase3:
    runs-on: ubuntu-latest
    needs: [backend-phase3]
    steps:
      - uses: actions/checkout@v4
      - name: Run contract/e2e phase3 flow
        run: |
          bash .trellis/tasks/04-21-novel-phase3-lifecycle-operations/test-flows/run_contract_e2e_phase3.sh
