name: novel-phase3-ws_d-template

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "是否执行测试（默认 false，避免误跑）"
        required: true
        default: "false"
      run_full_suite:
        description: "是否在定向集通过后继续执行扩展集（默认 false）"
        required: true
        default: "false"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend flow (WS-D)
        run: |
          chmod +x .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_backend_ws_d.sh
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            if [ "${{ github.event.inputs.run_full_suite }}" = "true" ]; then
              DRY_RUN=0 RUN_FULL=1 .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_backend_ws_d.sh
            else
              DRY_RUN=0 RUN_FULL=0 .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_backend_ws_d.sh
            fi
          else
            DRY_RUN=1 .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_backend_ws_d.sh
          fi

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Frontend flow (WS-D)
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.execute }}" -eq "true") {
            .\.trellis\tasks\04-21-novel-phase3-ws-d-test-acceptance\test-flows\run_frontend_ws_d.ps1 -Execute
          } else {
            .\.trellis\tasks\04-21-novel-phase3-ws-d-test-acceptance\test-flows\run_frontend_ws_d.ps1
          }

  contract_e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Contract + E2E flow (WS-D)
        run: |
          chmod +x .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_contract_e2e_ws_d.sh
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            DRY_RUN=0 .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_contract_e2e_ws_d.sh
          else
            DRY_RUN=1 .trellis/tasks/04-21-novel-phase3-ws-d-test-acceptance/test-flows/run_contract_e2e_ws_d.sh
          fi
